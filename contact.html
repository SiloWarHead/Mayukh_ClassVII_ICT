    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #001a33;
            color: #ffffff;
            font-family: Arial, sans-serif;
            font-size: 18px;
            line-height: 1.6;
        }

        nav {
            background-color: #003366;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 3px solid #00d4ff;
            width: 100%;
        }

        nav a {
            color: #00d4ff;
            text-decoration: none;
            font-weight: bold;
            margin: 0 20px;
            font-size: 18px;
        }

        nav a:hover {
            color: #ffffff;
            text-shadow: 0 0 5px #00d4ff;
        }

        .main-wrapper {
            width: 80%;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }

        h1, h2 { color: #00d4ff; margin-bottom: 20px; }

        /* Form Styling */
        form {
            background-color: #002244;
            padding: 30px;
            border: 1px solid #00d4ff;
            border-radius: 10px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #00d4ff;
        }

        input[type="text"], 
        input[type="email"], 
        select, 
        textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background-color: #001a33;
            border: 1px solid #00d4ff;
            color: white;
            font-size: 16px;
            border-radius: 5px;
        }

        input[type="submit"] {
            background-color: #00d4ff;
            color: #001a33;
            border: none;
            padding: 15px 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
            transition: 0.3s;
        }

        input[type="submit"]:hover {
            background-color: #ffffff;
            box-shadow: 0 0 15px #00d4ff;
        }
    </style>
</head>
